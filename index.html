<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>跑团职业检定</title>
    <meta
      name="description"
      content="32题测出你的跑团职业人格。基于新版题库的静态人格测试，映射到 16 种跑团职业结果。"
    >
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%23111111'/%3E%3Cpath d='M18 16h28v8H18zm0 12h18v8H18zm0 12h28v8H18z' fill='%23d0a85c'/%3E%3Ccircle cx='48' cy='18' r='8' fill='%238f3c35'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <div class="noise"></div>
    <div class="page-aura"></div>
    <main class="page-shell">
      <section id="home-view" class="view view-home">
        <section class="panel hero-panel hero-panel-simple">
          <p class="eyebrow">跑团测试</p>
          <h1 id="hero-title">跑团职业检定</h1>
          <p id="hero-subtitle" class="hero-subtitle">32 题，测出你的团桌职业</p>
          <div class="cta-row">
            <button id="start-button" class="button button-primary" type="button">开始鉴定</button>
            <button id="continue-button" class="button button-ghost" type="button" hidden>继续上次作答</button>
          </div>
          <p id="resume-note" class="home-tip" hidden></p>
        </section>

        <section id="atlas" class="panel atlas-panel">
          <p class="panel-kicker">16 人格图鉴</p>
          <div id="atlas-grid" class="atlas-grid"></div>
        </section>
      </section>

      <section id="quiz-view" class="view view-quiz" hidden>
        <div class="quiz-shell">
          <aside class="panel quiz-sidebar">
            <p class="eyebrow">公会登记</p>
            <h2 id="question-counter" class="quiz-counter"></h2>
            <p id="question-dimension" class="quiz-dimension"></p>
            <div class="progress-meta">
              <span id="quiz-progress-label">进度</span>
              <strong id="quiz-progress-value"></strong>
            </div>
            <div class="progress-track">
              <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="quiz-side-actions">
              <button id="quit-button" class="button button-ghost" type="button">返回首页</button>
              <button id="restart-inline-button" class="button button-ghost button-muted" type="button">重置作答</button>
            </div>
          </aside>

          <section class="panel quiz-panel">
            <p class="panel-kicker">当前题目</p>
            <h3 id="question-text" class="question-text"></h3>
            <div id="question-options" class="option-list"></div>
            <div class="quiz-actions">
              <button id="prev-button" class="button button-ghost" type="button">上一题</button>
              <p class="quiz-tip">已自动保存到当前浏览器，点击选项后会自动进入下一题。</p>
            </div>
          </section>
        </div>
      </section>

      <section id="result-view" class="view view-result" hidden>
        <article class="panel result-hero">
          <div class="result-topbar">
            <p class="eyebrow">鉴定结果</p>
            <a id="result-home-link" class="text-link" href="./#atlas">返回图鉴</a>
          </div>
          <div class="result-hero-layout">
            <div class="result-poster-shell">
              <img id="result-poster" class="result-poster" alt="人格海报">
            </div>
            <div class="result-copy-block">
              <div class="result-badge-row">
                <span id="result-code" class="result-code"></span>
                <span class="result-badge">公会职业</span>
              </div>
              <h1 id="result-name" class="result-name"></h1>
              <blockquote id="result-quote" class="result-quote"></blockquote>
              <p id="result-note" class="result-note" hidden></p>
              <div class="cta-row">
                <button id="download-button" class="button button-primary" type="button">导出结果图</button>
                <button id="copy-button" class="button button-ghost" type="button">复制分享文案</button>
                <button id="copy-link-button" class="button button-ghost" type="button">复制结果链接</button>
                <button id="restart-button" class="button button-ghost button-muted" type="button">再测一次</button>
              </div>
              <p id="copy-feedback" class="copy-feedback" aria-live="polite"></p>
            </div>
          </div>
        </article>

        <section class="result-analysis">
          <details id="profile-panel" class="panel analysis-card">
            <summary>
              <span>人格解析</span>
            </summary>
            <div id="result-profile" class="profile-copy"></div>
          </details>

          <details id="axis-panel" class="panel analysis-card">
            <summary>
              <span>四轴判定</span>
            </summary>
            <div id="axis-results" class="axis-grid"></div>
          </details>

          <details id="tag-panel" class="panel analysis-card">
            <summary>
              <span>8 标签计数</span>
            </summary>
            <div id="tag-counts"></div>
          </details>
        </section>
      </section>

      <footer class="site-footer" aria-label="创作者链接">
        <a
          class="site-footer-link"
          href="https://space.bilibili.com/549271"
          target="_blank"
          rel="noreferrer noopener"
        >
          <span class="site-footer-kicker">更多跑团整活</span>
          <strong>去我的 Bilibili 主页逛逛</strong>
          <span class="site-footer-meta">space.bilibili.com/549271</span>
        </a>
      </footer>
    </main>

    <script src="./src/data.js"></script>
    <script src="./src/main-app.js"></script>
  </body>
</html>
